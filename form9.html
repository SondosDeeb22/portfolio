<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Survey- form9</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 30px auto;
            background-color: white;
            border: 1px solid #999;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
            font-family: 'Times New Roman', Times, serif;
          
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        fieldset label {
            display: inline;
            margin-top: 0;
        }

        fieldset input {
            margin-right: 3px;
        }

        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            box-sizing: border-box;
        }

        fieldset {
            margin-top: 15px;
            padding: 10px;
        }

        legend {
            font-weight: bold;
        }

        .buttons {
            margin-top: 15px;
        }

        input[type="submit"],
        input[type="reset"] {
            padding: 5px 15px;
            margin-right: 10px;
        }
    </style>
</head>

<!-- ==========================================================================================================
========================================================================================================== -->

<body>

    <div class="container">
        <h1>Music Survey</h1>

        <form action="http://www.uyar.com/teaching/ecc006/2017spring/login.php" method="post">

            <!-- Name ===================================================== -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <!-- Email addresss ===================================================== -->
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="email" required>

            <!-- Checkbox Group =========================================================== -->
            <fieldset>
                <legend>Select Your Favorite Types of Music:</legend>

                <div><input type="checkbox" id="pop" name="music[]" value="Pop">
                <label for="pop">Pop</label></div>

                <div><input type="checkbox" id="classical" name="music[]" value="Classical">
                <label for="classical">Classical</label></div>

                <div><input type="checkbox" id="rock" name="music[]" value="Rock">
                <label for="rock">Rock</label></div>

                <div><input type="checkbox" id="folk" name="music[]" value="Folk">
                <label for="folk">Folk</label></div>

                <div><input type="checkbox" id="rap" name="music[]" value="Rap">
                <label for="rap">Rap</label></div>
            </fieldset>

            <!-- Radio Buttons ===================================================== -->
            <fieldset>
                <legend>Select how often you purchase Music CDs:</legend>

                <div><input type="radio" id="weekly" name="purchase" value="Weekly">
                <label for="weekly">Weekly</label></div>

                <div><input type="radio" id="few" name="purchase" value="A few CDs each year">
                <label for="few">A few CDs each year</label></div>

                <div><input type="radio" id="monthly" name="purchase" value="Monthly">
                <label for="monthly">Monthly</label></div>

                <div><input type="radio" id="never" name="purchase" value="Never purchase">
                <label for="never">Never purchase</label></div>
            </fieldset>

            <!-- Select Box -->
            <label for="location">Select the locations you listen to Music:</label>

            <select id="location" name="location" size="3">
                <option>At home</option>
                <option>In the car</option>
                <option>Anywhere (MP3 Player)</option>
                <option>At work</option>
                <option>At Parties</option>

            </select>

            <!-- Textarea --==========================================================================================================-->
            <label for="role">What role does music play in your life?</label>

            <textarea id="role" name="role" cols="60" rows="3"></textarea>

            <!-- Buttons===================================================== -->
            <div class="buttons">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </div>

        </form>
    </div>

</body>
</html>
